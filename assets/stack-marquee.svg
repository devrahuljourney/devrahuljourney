<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 120" width="680" height="120">
  <defs>

    <!-- Edge fade mask -->
    <linearGradient id="fadeGrad" x1="0" y1="0" x2="680" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="white" stop-opacity="0"/>
      <stop offset="80"  stop-color="white" stop-opacity="1"/>
      <stop offset="600" stop-color="white" stop-opacity="1"/>
      <stop offset="680" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="fadeMask" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="680" height="120" fill="url(#fadeGrad)"/>
    </mask>
    <clipPath id="clip">
      <rect width="680" height="120"/>
    </clipPath>

    <!-- Badge gradient background (subtle depth) -->
    <linearGradient id="badgeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e2530"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

  </defs>

  <rect width="680" height="120" fill="#0d1117"/>

  <g clip-path="url(#clip)">
    <g mask="url(#fadeMask)">

      <!-- ═══════════════════════════════════════════════════════ -->
      <!-- ROW 1 — Languages (orange) + Frameworks (blue)          -->
      <!-- Scrolls LEFT · dur=20s · W=1112                         -->
      <!-- ═══════════════════════════════════════════════════════ -->
      <g>
        <animateTransform attributeName="transform" type="translate"
                          from="0,0" to="-1112,0"
                          dur="20s" repeatCount="indefinite"/>

        <!-- ── Original set ── -->
        <!-- Java -->
        <rect x="0"   y="16" width="60"  height="28" rx="14" fill="url(#badgeBg)" stroke="#3d2a1a" stroke-width="1"/>
        <text x="30"  y="35" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="500" fill="#f0883e">Java</text>
